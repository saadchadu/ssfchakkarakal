<style>
:root {
  --purple-600: #131F43;
  --purple-100: #E4E7F0;
  --purple-800: #0C1430;
  --coral-600: #E44F57;
  --coral-100: #FDE7E8;
  --green-500: #01A387;
  --green-100: #DCF5EF;
  --green-800: #00715E;
  --bg: #F8F7FC;
  --card-bg: #FFFFFF;
  --text-primary: #1A1A2E;
  --text-secondary: #6B7280;
  --border: #E5E7EB;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100dvh; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }

/* Sticky Logo Header (pinned top) */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  height: calc(56px + env(safe-area-inset-top));
  padding: env(safe-area-inset-top) 1rem 0;
  background: rgba(255,255,255,0.95);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.site-logo {
  max-width: 220px;
  max-height: 40px;
  width: auto;
  height: auto;
  display: block;
  object-fit: contain;
}

/* Hero Banner */
.hero-banner {
  background: #131F43;
  padding: 1.75rem 1.25rem 3.5rem;
  position: relative;
  overflow: hidden;
}
.hero-banner::before {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0; left: 0;
  background: url('result-hero.png') center/cover no-repeat;
  opacity: 1;
}
.hero-banner::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(to top, rgba(19,31,67,0.88), transparent);
}
.hero-banner-inner {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
}
.hero-nav {
  display: flex;
  align-items: center;
  margin-bottom: 1.25rem;
}
.hero-back {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: #fff;
  font-size: 0.8125rem;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 8px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  transition: background 0.15s;
}
.hero-back:active { background: rgba(255,255,255,0.25); }
.hero-title {
  font-size: 2rem;
  font-weight: 800;
  color: #fff;
  margin-bottom: 8px;
  letter-spacing: -0.03em;
}
.hero-subtitle {
  font-size: 0.9375rem;
  color: rgba(255,255,255,0.7);
  line-height: 1.5;
}

/* Filter Bar (overlaps hero, sticks below header) */
.filter-bar {
  width: 100%;
  max-width: 900px;
  margin: -2rem auto 0;
  padding: 0 1.25rem;
  position: sticky;
  top: calc(56px + env(safe-area-inset-top));
  z-index: 10;
  min-width: 0;
  transition: background 0.2s ease;
}
.filter-bar.stuck {
  background: var(--bg);
}
.filter-bar-inner {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-bar-inner::-webkit-scrollbar { display: none; }
.filter-bar.stuck .filter-bar-inner {
  box-shadow: var(--shadow-md);
}
.filter-chip {
  padding: 9px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  background: var(--card-bg);
  color: var(--text-secondary);
  white-space: nowrap;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.filter-chip.active {
  background: var(--purple-600);
  color: #fff;
  border-color: var(--purple-600);
  box-shadow: 0 4px 12px rgba(19,31,67,0.25);
}
.filter-chip:active:not(.active) { background: var(--purple-100); border-color: var(--purple-600); }

/* Main Content */
.main-content {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem 1.25rem 2rem;
  min-width: 0;
}

/* Stats Row */
.stats-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding: 10px 2px;
}
.stats-text { font-size: 0.8125rem; color: var(--text-secondary); }
.stats-text strong { color: var(--text-primary); font-weight: 700; }
.stats-published { font-size: 0.75rem; font-weight: 600; color: var(--green-800); background: var(--green-100); padding: 4px 10px; border-radius: 12px; }

/* Results Grid */
.results-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.result-card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.result-card:active { transform: scale(0.98); border-color: var(--purple-600); box-shadow: var(--shadow-md); }
.result-card-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.result-card-icon.published { background: var(--green-100); color: var(--green-800); }
.result-card-icon.pending { background: #F3F4F6; color: #9CA3AF; }
.result-card-body { flex: 1; min-width: 0; }
.result-card-name { font-size: 0.875rem; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.result-card-status { font-size: 0.6875rem; font-weight: 500; }
.result-card-status.published { color: var(--green-800); }
.result-card-status.pending { color: var(--text-secondary); }
.result-card-action { flex-shrink: 0; color: var(--text-secondary); }
.result-card-download {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px;
  background: var(--purple-100); color: var(--purple-800);
  font-size: 0.6875rem; font-weight: 600; text-decoration: none;
}

/* Placeholder */
.results-placeholder {
  text-align: center;
  padding: 4rem 1.5rem;
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}
.results-placeholder svg { display: block; margin: 0 auto 16px; opacity: 0.4; }
.results-placeholder h3 { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.results-placeholder p { font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999; display: none;
  align-items: center; justify-content: center;
  padding: 1.5rem;
  -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card-bg); border-radius: var(--radius-lg);
  width: 100%; max-width: 400px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn { from { transform: scale(0.92) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.modal-poster { width: 100%; max-height: 70vh; object-fit: contain; display: block; background: #F3F4F6; }
.modal-body { padding: 20px; }
.modal-title { font-size: 1.0625rem; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
.modal-category { font-size: 0.6875rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
.modal-download {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 13px; border-radius: var(--radius-md);
  background: var(--purple-600); color: #fff;
  text-decoration: none; font-size: 0.875rem; font-weight: 600;
  border: none; cursor: pointer;
}
.modal-download:active { background: var(--purple-800); }
.modal-close {
  display: block; width: 100%; padding: 12px; margin-top: 8px;
  border-radius: var(--radius-md); background: #F3F4F6;
  color: var(--text-secondary); font-size: 0.8125rem; font-weight: 500;
  border: none; cursor: pointer; font-family: inherit; text-align: center;
}
.modal-close:active { background: #E5E7EB; }
.modal-not-published { text-align: center; padding: 2.5rem 1.5rem; }
.modal-not-published svg { display: block; margin: 0 auto 14px; }
.modal-not-published h3 { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.modal-not-published p { font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; }

/* Responsive */
@media (min-width: 768px) {
  .hero-banner { padding: 3.5rem 2rem 5.5rem; }
  .hero-title { font-size: 2.75rem; }
  .hero-subtitle { font-size: 1.0625rem; }
  .filter-bar { padding: 0 2rem; margin-top: -2.5rem; }
  .filter-bar-inner { padding: 18px 24px; gap: 10px; }
  .main-content { padding: 2rem; }
  .results-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
}
@media (min-width: 1024px) {
  .hero-title { font-size: 3rem; }
  .results-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>

})();
</script>

<!-- Main Content -->

      <p>Choose a category from the filter above to view program results.</p>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="result-modal" onclick="event.stopPropagation()"></div>
</div>

<script>
var categoryItems = {
  LP: ['Madh Ganam', 'Katha Kathanam', 'Quiz', 'Pencil Drawing', 'Jalachayam', 'Prasangam Malayalam', 'Vayana Arabi Mal', 'Vayana Mal', 'Bhasha Keli', 'Book Test', 'Hand Writing Girls', 'Pencil Drawing Girls', 'Jalachayam Girls'],
  UP: ['Katha Kathanam', 'Mappilappattu', 'Ghanithakeli', 'Quiz', 'Pencil Drawing', 'Jalachayam', 'Katharachana', 'Spelling Bee', 'Sudoku', 'Prasangam Malayalam', 'Book Test', 'Katharachana Girls', 'Jalachayam Girls', 'Origami Girls'],
  HS: ['Madhganam', 'Kavitha Parayanam Malayalam', 'Quiz', 'Katha Rachana', 'Kavitha Rachana', 'Essay Malayalam', 'Caption Writing', 'Language Game', 'Pencil Drawing', 'Water Colour', 'Mappilappattu', 'Arabi Padyam', 'Prasangam English', 'Prasangam Malayalam', 'News Reading', 'Urdu Kavitha Parayanam', 'Book Test', 'Pencil Drawing Girls', 'Water Colour Girls', 'Katha Rachana Girls', 'Kavitha Rachana Girls'],
  HSS: ['Urdu Kavitha Parayanam', 'Bhakthiganam', 'Quiz', 'Katha Rachana', 'Kavitha Rachana', 'Essay Malayalam', 'Essay English', 'Pencil Drawing', 'Water Colour', 'News Writing', 'Arabic Calligraphy', 'Digital Painting', 'Mappilappattu', 'Prasangam Malayalam', 'Book Test', 'Arabic Calligraphy Girls', 'Embroidery Girls', 'Kavitha Rachana Girls', 'Reel Making'],
  Junior: ['Arabi Prasangam', 'Quiz', 'Social Text', 'Calligraphy', 'Kavitha Rachana', 'Katha Rachana', 'Essay Malayalam', 'Essay Arabi', 'Mudravakya Rachana', 'Madhgana Rachana', 'Translation Arabi', 'AI Kavitha Rachana', 'Prasangam Malayalam', 'Prasangam English', 'Mappilappattu', 'Book Test', 'Socio Synapse'],
  Senior: ['Mappilappattu', 'Quiz', 'Social Text', 'E Poster', 'Poster Designing', 'Katha Rachana', 'Kavitha Rachana', 'Kavitha Rachana English', 'Essay Malayalam', 'Essay English', 'Translation English', 'Madhgana Rachana', 'Mudravakya Rachana', 'Feature Writing', 'Digital Painting', 'Prasangam Malayalam', 'Prasangam English', 'Hamd Urdu', 'Kavitha Parayanam English', 'Book Test'],
  General: ['Viplava Ganam', 'Qawali', 'Malappattu', 'Risala Quiz', 'Qaseeda', 'Nasheeda', 'Moulid Parayanam', 'Collage', 'Viplava Gana Rachana', 'Spot Magazine', 'Chumarezhuth', 'Mappila Song Writing', 'Group Song Cat A', 'Group Song Cat B']
};

var RAW_BASE = 'results/';
var cache = {};

function toKey(str) { return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, ''); }

function fetchResults(category, callback) {
  if (cache[category]) { callback(cache[category]); return; }

  // Use local manifest — each entry is a folder name containing poster.jpg
  if (window.RESULTS_MANIFEST && window.RESULTS_MANIFEST[category]) {
    var results = {};
    window.RESULTS_MANIFEST[category].forEach(function(folder) {
      results[folder] = folder; // key = folder name
    });
    cache[category] = results;
    callback(results);
    return;
  }

  cache[category] = {};
  callback({});
}

function selectCategory(category, btn) {
  document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');

  var grid = document.getElementById('results-grid');
  var items = categoryItems[category] || [];
  grid.innerHTML = '<div class="results-placeholder"><p>Loading...</p></div>';
  document.getElementById('stats-row').style.display = 'none';

  fetchResults(category, function(results) {
    var publishedCount = 0;
    var html = '';

    // Sort: published items first, then unpublished
    var sortedItems = items.slice().sort(function(a, b) {
      var aPublished = !!results[toKey(a)];
      var bPublished = !!results[toKey(b)];
      if (aPublished && !bPublished) return -1;
      if (!aPublished && bPublished) return 1;
      return 0;
    });

    sortedItems.forEach(function(item) {
      var fileKey = toKey(item);
      var isPublished = !!results[fileKey];
      if (isPublished) publishedCount++;

      html += '<div class="result-card" onclick="openResult(\'' + category + '\', \'' + item.replace(/'/g, "\\'") + '\')">';
      html += '<div class="result-card-icon ' + (isPublished ? 'published' : 'pending') + '">';
      if (isPublished) {
        html += '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      } else {
        html += '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
      }
      html += '</div>';
      html += '<div class="result-card-body">';
      html += '<div class="result-card-name">' + item + '</div>';
      html += '<div class="result-card-status ' + (isPublished ? 'published' : 'pending') + '">' + (isPublished ? 'Result available' : 'Not published yet') + '</div>';
      html += '</div>';
      html += '<div class="result-card-action">';
      html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
      html += '</div>';
      html += '</div>';
    });

    grid.innerHTML = html;

    document.getElementById('stat-count').textContent = items.length;
    document.getElementById('stat-category').textContent = category;
    document.getElementById('stat-published').textContent = publishedCount + ' published';
    document.getElementById('stats-row').style.display = 'flex';
  });
}

function openResult(category, item) {
  var modal = document.getElementById('result-modal');
  var overlay = document.getElementById('modal-overlay');
  modal.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-secondary);font-size:0.8125rem;">Loading...</div>';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  fetchResults(category, function(results) {
    var fileKey = toKey(item);
    var folder = results[fileKey];
    if (folder) {
      // Try to load poster.jpg from the folder
      var basePath = RAW_BASE + category + '/' + folder + '/poster';
      var img = new Image();
      var attempts = ['jpg', 'jpeg', 'png', 'webp'];
      var idx = 0;

      function tryNext() {
        if (idx >= attempts.length) {
          // None worked — show not published
          showNotPublished(modal, item);
          return;
        }
        var ext = attempts[idx++];
        var url = basePath + '.' + ext;
        img.onload = function() { showPoster(modal, url, item, category, 'poster.' + ext); };
        img.onerror = tryNext;
        img.src = url;
      }
      tryNext();
    } else {
      showNotPublished(modal, item);
    }
  });
}

function showPoster(modal, rawUrl, item, category, fileName) {
  modal.innerHTML =
    '<img class="modal-poster" src="' + rawUrl + '" alt="' + item + '" decoding="async">' +
    '<div class="modal-body">' +
      '<div class="modal-title">' + item + '</div>' +
      '<div class="modal-category">' + category + '</div>' +
      '<button type="button" class="modal-download" onclick="downloadPoster(this, \'' + rawUrl + '\', \'' + fileName.replace(/'/g, "\\'") + '\')">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
        '<span>Download Poster</span>' +
      '</button>' +
      '<button class="modal-close" onclick="closeModal()">Close</button>' +
    '</div>';
}

function showNotPublished(modal, item) {
  modal.innerHTML =
    '<div class="modal-not-published">' +
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
      '<h3>' + item + '</h3>' +
      '<p>Result not published yet. Check back later.</p>' +
    '</div>' +
    '<div style="padding:0 20px 20px;"><button class="modal-close" onclick="closeModal()">Close</button></div>';
}

function downloadPoster(btn, url, fileName) {
  var label = btn.querySelector('span');
  var original = label ? label.textContent : '';
  if (label) label.textContent = 'Downloading...';
  btn.style.pointerEvents = 'none';

  fetch(url)
    .then(function(res) { if (!res.ok) throw new Error('fetch failed'); return res.blob(); })
    .then(function(blob) {
      var blobUrl = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = blobUrl;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 1000);
      if (label) label.textContent = original;
      btn.style.pointerEvents = '';
    })
    .catch(function() {
      // Fallback: open in a new tab if blob download is blocked
      window.open(url, '_blank');
      if (label) label.textContent = original;
      btn.style.pointerEvents = '';
    });
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Toggle a solid background on the filter bar once it pins under the header
(function() {
  var header = document.querySelector('.site-header');
  var filterBar = document.querySelector('.filter-bar');
  if (!filterBar) return;
  function onScroll() {
    var headerH = header ? header.getBoundingClientRect().height : 0;
    var stuck = filterBar.getBoundingClientRect().top <= headerH + 1;
    filterBar.classList.toggle('stuck', stuck);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll);
  onScroll();
})();
</script>
